<!DOCTYPE html>
<html>

<head>

<title>AgentHubs</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#1b1b1b;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.agent{
display:block;
margin:8px 0;
padding:10px;
background:#2a2a2a;
cursor:pointer;
border-radius:5px;
}

.agent:hover{
background:#3a3a3a;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:20px;
}

.message{
margin:10px 0;
}

.user{
color:#4da6ff;
}

.ai{
color:#00ff99;
}

.inputBox{
display:flex;
padding:15px;
background:#1b1b1b;
}

.inputBox input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#2a2a2a;
color:white;
}

.inputBox button{
padding:10px 20px;
border:none;
background:#4da6ff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AgentHubs</h2>

<div class="agent">Startup Agent</div>
<div class="agent">Study Agent</div>
<div class="agent">Content Agent</div>
<div class="agent">Marketing Agent</div>
<div class="agent">Research Agent</div>
<div class="agent">Photo Agent</div>
<div class="agent">Image Agent</div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputBox">

<input id="input" placeholder="Ask your AI agent...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("input").value

let chat=document.getElementById("chat")

let userMsg=document.createElement("div")
userMsg.className="message user"
userMsg.innerText="You: "+input

chat.appendChild(userMsg)

let aiMsg=document.createElement("div")
aiMsg.className="message ai"
aiMsg.innerText="AI: thinking..."

chat.appendChild(aiMsg)

document.getElementById("input").value=""

}

</script>

</body>

</html>
